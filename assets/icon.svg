  <rect x="28" y="28" width="200" height="200" fill="#0000aa" stroke="#55ffff" stroke-width="6"/>
  <text x="128" y="66" text-anchor="middle" font-family="Courier New, monospace" font-size="26" font-weight="700" fill="#ffff55">MISSION</text>
  <text x="128" y="98" text-anchor="middle" font-family="Courier New, monospace" font-size="26" font-weight="700" fill="#ffff55">CONTROL</text>
